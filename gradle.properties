# Done to increase the memory available to gradle.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Toolchain — pinned once, read by settings, buildSrc and every module.
kotlin_version=2.4.0
loom_version=1.17-SNAPSHOT

# Library properties
mod_version=2.1.1
maven_group=org.blackaddons

# Skija — version-neutral across Minecraft platforms.
skija_version=0.143.17
# Transitive dep of skija-shared; must be bundled explicitly (see platform build).
types_version=0.2.0

# ── Minecraft 26.2 ──────────────────────────────────────────────────────────
mc262_minecraft_version=26.2
mc262_loader_version=0.19.3
mc262_fabric_kotlin_version=1.13.12+kotlin.2.4.0
mc262_fabric_api_version=0.152.2+26.2

# ── Minecraft 26.1.2 ────────────────────────────────────────────────────────
mc2612_minecraft_version=26.1.2
mc2612_loader_version=0.19.3
mc2612_fabric_kotlin_version=1.13.12+kotlin.2.4.0
mc2612_fabric_api_version=0.155.2+26.1.2
